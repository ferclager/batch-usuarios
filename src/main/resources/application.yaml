spring:
  application:
    name: batch-usuarios
  batch:
    jdbc:
      initialize-schema: always # primera ejecucion always, resto never
    job:
      name: importarUsuariosJob
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-usuario.sql
  datasource:
    url: jdbc:h2:file:./data/batchdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  level:
    org.springframework.jdbc.datasource.init.ScriptUtils: DEBUG
    org.springframework.batch: DEBUG
    org.h2: DEBUG
