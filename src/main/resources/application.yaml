spring:
  application:
    name: batch-usuarios
  batch:
    jdbc:
      initialize-schema: always
    job:
      name: importarUsuariosJob
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  level:
    org.springframework.jdbc.datasource.init.ScriptUtils: DEBUG
    org.springframework.batch: DEBUG
    org.h2: DEBUG
